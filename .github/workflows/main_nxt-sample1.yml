name: Build and deploy Next.js app to Azure Web App - nxt-sample

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies and Build Next.js
        run: |
          npm ci
          npm run build

      # 임시 폴더(next-deploy)를 만들어 배포할 핵심 파일들만 한곳에 깔끔하게 모으기
      - name: Prepare deployment files
        run: |
          mkdir next-deploy
          cp -r .next next-deploy/.next
          cp -r public next-deploy/public
          cp package.json next-deploy/package.json
          cp package-lock.json next-deploy/package-lock.json
          cp next.config.ts next-deploy/next.config.ts

      # 모아둔 폴더 자체를 아티팩트로 업로드
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: next-deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # environment: production

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: . # 현재 작업 디렉토리에 바로 다운로드 (여기안에 .next, public 등이 풀림)

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'nxt-sample1'
          slot-name: 'Production'
          package: . # 현재 디렉토리 구조 그대로 Azure 루트(wwwroot)에 업로드
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8BB737B69429478385EB0E4A4EDF8FBC }}

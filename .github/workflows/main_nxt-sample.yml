name: Build and deploy Next.js app to Azure Web App - nxt-sample

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies and Build Next.js
        run: |
          npm ci
          npm run build

      # 차후 경로 꼬임을 방지하기 위해, 배포에 필요한 파일들을 하나의 zip으로 묶어 아티팩트 보관
      - name: Zip artifact for deployment
        run: |
          zip -r release.zip .next public package.json package-lock.json next.config.js -q

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # environment: production

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # 압축 해제 후 필요 없는 압축 파일은 제거
      - name: Unzip artifact for deployment
        run: |
          unzip release.zip
          rm release.zip

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'nxt-sample'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B317747C689F42C7A70418C9C35C6ED6 }}

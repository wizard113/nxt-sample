name: Build and deploy Next.js app to Azure Web App - nxt-sample

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies and Build Next.js
        run: |
          npm ci
          npm run build

      # standalone 빌드 결과물과 정적 파일들을 하나의 배포용 폴더에 깔끔하게 수집
      # 파일들을 'next-deploy' 내부에 모으는 것이 아니라, 내부 파일들을 아티팩트로 바로 올리기 위함입니다.
      - name: Prepare deployment files
        run: |
          mkdir next-deploy
          cp -r .next/standalone/* next-deploy/
          mkdir -p next-deploy/public next-deploy/.next/static
          cp -r public/* next-deploy/public/ 2>/dev/null || echo "No public folder"
          cp -r .next/static/* next-deploy/.next/static/

      # 중요: path를 'next-deploy/'가 아닌 'next-deploy' 안의 내용물들만 지정하여 업로드합니다.
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: next-deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # 이제 다운로드하면 현재 루트(.) 자리에 바로 server.js, .next, public 등이 깔끔하게 풀립니다.
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      # standalone 방식은 이미 프로덕션에 필요한 최소한의 node_modules가 포함되어 있어
      # 별도의 npm ci --omit=dev를 돌릴 필요가 없습니다. (배포 속도 대폭 향상)

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'nxt-sample'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B317747C689F42C7A70418C9C35C6ED6 }}
